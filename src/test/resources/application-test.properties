# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate settings for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Disable scheduled tasks during tests
spring.task.scheduling.enabled=false

# Telegram bot settings for tests
telegram.mode=fake
telegram.bot.name=test_bot
telegram.bot.token=test_token

# App settings
app.version=test
app.url=http://localhost
app.timeout=1000
remind.period=1000
recommendation.alert.period=1000
daily.advice.cron=0 0 0 * * ?